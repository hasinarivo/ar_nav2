<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Nav OSM - WebXR</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
    #ui {
      position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6);
      padding: 12px; border-radius: 8px; z-index: 100; pointer-events: auto;
    }
    button { padding: 12px 20px; font-size: 1.1em; margin: 5px; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <h2>AR Navigation Piétonne</h2>
    <button id="startAR">Démarrer AR (WebXR)</button>
    <button id="fetchOSM">Charger bâtiments OSM</button>
    <div id="status">Prêt</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/webxr/ARButton.js"></script>
  <!-- Ou utiliser la version récente via import si tu passes en modules -->

  <script src="app-xr.js"></script>
</body>
</html>
