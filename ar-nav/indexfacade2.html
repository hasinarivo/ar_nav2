<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Détection Façades - Version Ultra-Rapide</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    
    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    #output-canvas {
      z-index: 10;
      pointer-events: none;
    }
    
    #video-feed {
      z-index: 1;
      transform: scaleX(-1);
    }
    
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 12px;
      z-index: 20;
      color: white;
      pointer-events: auto;
      max-width: 320px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    button {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 600;
      transition: transform 0.2s;
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    #status {
      margin-top: 10px;
      font-size: 0.85em;
      color: #4ecdc4;
      font-family: monospace;
    }
    
    .stats {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      padding: 8px 12px;
      border-radius: 8px;
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      z-index: 20;
      pointer-events: none;
    }
    
    .fps-counter {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      padding: 8px 12px;
      border-radius: 8px;
      color: #ffaa44;
      font-family: monospace;
      font-size: 11px;
      z-index: 20;
      pointer-events: none;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .detecting {
      animation: pulse 1s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="container">
    <video id="video-feed" autoplay playsinline></video>
    <canvas id="output-canvas"></canvas>
    
    <div id="ui">
      <h2>🏢 Détection Façades <span style="font-size:12px;">⚡ Ultra-Rapide</span></h2>
      <div id="status">🎥 Initialisation caméra...</div>
      <button id="toggle-detection">⏸️ Pause</button>
      <button id="calibrate">🎯 Calibrer sensibilité</button>
    </div>
    
    <div class="stats" id="stats">
      🏢 Façades: 0 | 📏 Lignes: 0
    </div>
    <div class="fps-counter" id="fps">
      🚀 FPS: --
    </div>
  </div>

  <script>
    // ====================== CONFIGURATION ======================
    let video = null;
    let canvas = null;
    let ctx = null;
    let detectionActive = true;
    let animationId = null;
    
    // Paramètres ajustables
    let params = {
      edgeThreshold: 25,      // Sensibilité contours (plus bas = plus sensible)
      minLineLength: 60,      // Longueur minimale des lignes (pixels)
      angleTolerance: 18,     // Tolérance angle (degrés)
      minVerticalLines: 3,    // Minimum lignes verticales pour façade
      minHorizontalLines: 2,  // Minimum lignes horizontales pour façade
      maxFacades: 5,          // Nombre max de façades à afficher
      cannyLow: 40,           // Seuil bas Canny
      cannyHigh: 120          // Seuil haut Canny
    };
    
    let currentFacades = [];
    let allLines = { vertical: [], horizontal: [], all: [] };
    let frameCount = 0;
    let lastTime = performance.now();
    let fps = 0;
    
    // ====================== INITIALISATION RAPIDE ======================
    async function init() {
      await initCamera();
      setupCanvas();
      setupEventListeners();
      startProcessing();
      updateStatus('✅ Prêt - Détection active');
    }
    
    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'environment',
            width: { ideal: 640 },  // Résolution réduite pour performances
            height: { ideal: 480 }
          }
        });
        
        video = document.getElementById('video-feed');
        video.srcObject = stream;
        
        await new Promise((resolve) => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });
        
        updateStatus('📷 Caméra OK - Détection en cours');
      } catch (err) {
        console.error('Erreur caméra:', err);
        updateStatus('❌ Erreur caméra - Vérifiez les permissions');
      }
    }
    
    function setupCanvas() {
      canvas = document.getElementById('output-canvas');
      ctx = canvas.getContext('2d');
      
      const resizeCanvas = () => {
        if (video) {
          canvas.width = video.videoWidth || window.innerWidth;
          canvas.height = video.videoHeight || window.innerHeight;
        }
      };
      
      video?.addEventListener('loadedmetadata', resizeCanvas);
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
    }
    
    function setupEventListeners() {
      const toggleBtn = document.getElementById('toggle-detection');
      toggleBtn.onclick = () => {
        detectionActive = !detectionActive;
        toggleBtn.textContent = detectionActive ? '⏸️ Pause' : '▶️ Démarrer';
        toggleBtn.style.background = detectionActive ? 
          'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' : 
          'linear-gradient(135deg, #666 0%, #555 100%)';
        updateStatus(detectionActive ? '🔍 Détection active' : '⏸️ En pause');
      };
      
      document.getElementById('calibrate').onclick = () => {
        calibrateSensitivity();
      };
    }
    
    // ====================== ALGORITHME DE DÉTECTION LÉGER ======================
    async function startProcessing() {
      const processFrame = () => {
        if (!video || video.readyState !== 4) {
          requestAnimationFrame(processFrame);
          return;
        }
        
        // Mise à jour taille canvas
        if (canvas.width !== video.videoWidth && video.videoWidth > 0) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        }
        
        const startTime = performance.now();
        
        if (detectionActive && canvas.width > 0 && canvas.height > 0) {
          detectFacadesLight();
        }
        
        // Calcul FPS
        frameCount++;
        const now = performance.now();
        if (now - lastTime >= 1000) {
          fps = frameCount;
          frameCount = 0;
          lastTime = now;
          document.getElementById('fps').innerHTML = `⚡ ${fps} FPS`;
        }
        
        // Affichage vidéo
        if (ctx) {
          ctx.save();
          ctx.scale(-1, 1);
          ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
          ctx.restore();
          
          // Dessiner les détections
          drawDetections();
        }
        
        requestAnimationFrame(processFrame);
      };
      
      processFrame();
    }
    
    function detectFacadesLight() {
      // Capturer un frame de la vidéo
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = video.videoWidth;
      tempCanvas.height = video.videoHeight;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.save();
      tempCtx.scale(-1, 1);
      tempCtx.drawImage(video, -tempCanvas.width, 0, tempCanvas.width, tempCanvas.height);
      tempCtx.restore();
      
      const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
      
      // 1. Détection des contours simplifiée
      const edges = detectEdges(imageData);
      
      // 2. Extraction des lignes par Hough transform simplifiée
      const lines = houghTransform(edges, tempCanvas.width, tempCanvas.height);
      
      // 3. Classification vertical/horizontal
      allLines = classifyLines(lines);
      
      // 4. Détection des quadrilatères de façade
      currentFacades = detectFacadeRectangles(allLines.vertical, allLines.horizontal);
      
      // Mise à jour stats
      document.getElementById('stats').innerHTML = 
        `🏢 Façades: ${currentFacades.length} | 📏 Lignes: ${allLines.all.length}`;
      
      // Nettoyage
      tempCanvas.remove();
    }
    
    // Détection de contours simplifiée (filtre de Sobel rapide)
    function detectEdges(imageData) {
      const width = imageData.width;
      const height = imageData.height;
      const data = imageData.data;
      const edges = new Uint8Array(width * height);
      
      // Conversion en niveaux de gris + détection Sobel simplifiée
      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const idx = (y * width + x) * 4;
          
          // Luminosité (gris)
          const gray = (data[idx] + data[idx+1] + data[idx+2]) / 3;
          
          // Gradient horizontal simplifié
          const gx = Math.abs(
            ((data[idx - 4] + data[idx - 4 + 1] + data[idx - 4 + 2]) / 3) -
            ((data[idx + 4] + data[idx + 4 + 1] + data[idx + 4 + 2]) / 3)
          );
          
          // Gradient vertical simplifié
          const gy = Math.abs(
            ((data[idx - width*4] + data[idx - width*4 + 1] + data[idx - width*4 + 2]) / 3) -
            ((data[idx + width*4] + data[idx + width*4 + 1] + data[idx + width*4 + 2]) / 3)
          );
          
          const magnitude = Math.sqrt(gx * gx + gy * gy);
          edges[y * width + x] = magnitude > params.edgeThreshold ? 255 : 0;
        }
      }
      
      return edges;
    }
    
    // Transformée de Hough simplifiée pour lignes
    function houghTransform(edges, width, height) {
      const lines = [];
      const accumulator = {};
      const thetaResolution = 180;
      const rhoResolution = 2;
      
      const maxRho = Math.sqrt(width * width + height * height);
      const rhoBins = Math.floor(maxRho / rhoResolution) * 2;
      
      // Accumulateur pour les lignes potentielles
      for (let y = 0; y < height; y += 2) {  // Échantillonnage pour performance
        for (let x = 0; x < width; x += 2) {
          if (edges[y * width + x] === 255) {
            for (let theta = 0; theta < thetaResolution; theta += 2) {  // Pas de 2 degrés
              const thetaRad = theta * Math.PI / 180;
              const rho = x * Math.cos(thetaRad) + y * Math.sin(thetaRad);
              const rhoIdx = Math.floor(rho / rhoResolution) + rhoBins / 2;
              const key = `${theta},${rhoIdx}`;
              accumulator[key] = (accumulator[key] || 0) + 1;
            }
          }
        }
      }
      
      // Extraire les lignes de l'accumulateur
      const threshold = Math.min(50, Math.max(20, Object.values(accumulator).length / 100));
      
      for (const [key, votes] of Object.entries(accumulator)) {
        if (votes > threshold) {
          const [theta, rhoIdx] = key.split(',');
          const thetaRad = parseInt(theta) * Math.PI / 180;
          const rho = (parseInt(rhoIdx) - rhoBins / 2) * rhoResolution;
          
          // Calculer les extrémités de la ligne
          const a = Math.cos(thetaRad);
          const b = Math.sin(thetaRad);
          
          let x1 = 0, y1 = 0, x2 = 0, y2 = 0;
          
          if (Math.abs(a) > 0.001) {
            x1 = 0;
            y1 = (rho - x1 * a) / b;
            x2 = width;
            y2 = (rho - x2 * a) / b;
          } else {
            y1 = 0;
            x1 = (rho - y1 * b) / a;
            y2 = height;
            x2 = (rho - y2 * b) / a;
          }
          
          const length = Math.hypot(x2 - x1, y2 - y1);
          
          if (length > params.minLineLength && 
              x1 >= 0 && x1 <= width && 
              x2 >= 0 && x2 <= width &&
              y1 >= 0 && y1 <= height && 
              y2 >= 0 && y2 <= height) {
            
            lines.push({
              x1: Math.max(0, Math.min(width, x1)),
              y1: Math.max(0, Math.min(height, y1)),
              x2: Math.max(0, Math.min(width, x2)),
              y2: Math.max(0, Math.min(height, y2)),
              length: length,
              theta: thetaRad
            });
          }
        }
      }
      
      return lines;
    }
    
    function classifyLines(lines) {
      const vertical = [];
      const horizontal = [];
      
      lines.forEach(line => {
        let angle = Math.atan2(line.y2 - line.y1, line.x2 - line.x1) * 180 / Math.PI;
        angle = Math.abs(angle);
        if (angle > 90) angle = 180 - angle;
        
        line.angle = angle;
        
        if (Math.abs(angle - 90) < params.angleTolerance && line.length > params.minLineLength) {
          vertical.push(line);
        } else if (angle < params.angleTolerance && line.length > params.minLineLength) {
          horizontal.push(line);
        }
      });
      
      // Filtrage par proximité
      const filteredVertical = filterLinesByProximity(vertical, 'vertical');
      const filteredHorizontal = filterLinesByProximity(horizontal, 'horizontal');
      
      return {
        vertical: filteredVertical,
        horizontal: filteredHorizontal,
        all: lines
      };
    }
    
    function filterLinesByProximity(lines, orientation) {
      if (lines.length < 2) return lines;
      
      const groups = [];
      const used = new Set();
      
      for (let i = 0; i < lines.length; i++) {
        if (used.has(i)) continue;
        
        const group = [lines[i]];
        used.add(i);
        
        for (let j = i + 1; j < lines.length; j++) {
          if (used.has(j)) continue;
          
          const distance = orientation === 'vertical'
            ? Math.abs(lines[i].x1 - lines[j].x1)
            : Math.abs(lines[i].y1 - lines[j].y1);
          
          if (distance < 40) {
            group.push(lines[j]);
            used.add(j);
          }
        }
        
        // Moyenne des lignes du groupe
        if (group.length > 0) {
          const avgX1 = group.reduce((sum, l) => sum + l.x1, 0) / group.length;
          const avgY1 = group.reduce((sum, l) => sum + l.y1, 0) / group.length;
          const avgX2 = group.reduce((sum, l) => sum + l.x2, 0) / group.length;
          const avgY2 = group.reduce((sum, l) => sum + l.y2, 0) / group.length;
          
          groups.push({
            x1: avgX1, y1: avgY1, x2: avgX2, y2: avgY2,
            length: Math.hypot(avgX2 - avgX1, avgY2 - avgY1),
            angle: group[0].angle
          });
        }
      }
      
      return groups;
    }
    
    function detectFacadeRectangles(verticalLines, horizontalLines) {
      const facades = [];
      
      if (verticalLines.length < params.minVerticalLines || 
          horizontalLines.length < params.minHorizontalLines) {
        return facades;
      }
      
      // Trouver les lignes extrêmes
      const leftLines = verticalLines.sort((a,b) => a.x1 - b.x1);
      const rightLines = verticalLines.sort((a,b) => b.x1 - a.x1);
      const topLines = horizontalLines.sort((a,b) => a.y1 - b.y1);
      const bottomLines = horizontalLines.sort((a,b) => b.y1 - a.y1);
      
      // Prendre les plus significatives
      const candidates = [
        { left: leftLines[0], right: rightLines[0], top: topLines[0], bottom: bottomLines[0] },
        { left: leftLines[0], right: rightLines[1], top: topLines[0], bottom: bottomLines[0] },
        { left: leftLines[1], right: rightLines[0], top: topLines[0], bottom: bottomLines[0] }
      ];
      
      for (const cand of candidates) {
        if (!cand.left || !cand.right || !cand.top || !cand.bottom) continue;
        
        const quadrilateral = {
          topLeft: { x: cand.left.x1, y: cand.top.y1 },
          topRight: { x: cand.right.x1, y: cand.top.y1 },
          bottomLeft: { x: cand.left.x1, y: cand.bottom.y1 },
          bottomRight: { x: cand.right.x1, y: cand.bottom.y1 }
        };
        
        // Calculer la surface approximative
        const width = Math.abs(quadrilateral.topRight.x - quadrilateral.topLeft.x);
        const height = Math.abs(quadrilateral.bottomLeft.y - quadrilateral.topLeft.y);
        const area = width * height;
        
        if (area > 5000 && area < canvas.width * canvas.height * 0.8) {
          facades.push(quadrilateral);
        }
        
        if (facades.length >= params.maxFacades) break;
      }
      
      return facades;
    }
    
    function drawDetections() {
      if (!ctx) return;
      
      ctx.save();
      ctx.scale(-1, 1);
      
      // Dessiner les lignes détectées
      allLines.vertical.forEach(line => {
        ctx.beginPath();
        ctx.strokeStyle = '#ff4444';
        ctx.lineWidth = 2;
        ctx.moveTo(-line.x1, line.y1);
        ctx.lineTo(-line.x2, line.y2);
        ctx.stroke();
      });
      
      allLines.horizontal.forEach(line => {
        ctx.beginPath();
        ctx.strokeStyle = '#44ff44';
        ctx.lineWidth = 2;
        ctx.moveTo(-line.x1, line.y1);
        ctx.lineTo(-line.x2, line.y2);
        ctx.stroke();
      });
      
      // Dessiner les quadrilatères des façades
      const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7'];
      
      currentFacades.forEach((facade, idx) => {
        const color = colors[idx % colors.length];
        const points = [facade.topLeft, facade.topRight, facade.bottomRight, facade.bottomLeft];
        
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.fillStyle = `${color}33`;
        
        ctx.moveTo(-points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(-points[i].x, points[i].y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        
        // Dessiner les coins
        points.forEach(point => {
          ctx.beginPath();
          ctx.fillStyle = color;
          ctx.arc(-point.x, point.y, 5, 0, 2 * Math.PI);
          ctx.fill();
        });
        
        // Numéro de façade
        const centerX = (facade.topLeft.x + facade.topRight.x + facade.bottomLeft.x + facade.bottomRight.x) / 4;
        const centerY = (facade.topLeft.y + facade.topRight.y + facade.bottomLeft.y + facade.bottomRight.y) / 4;
        ctx.fillStyle = color;
        ctx.font = 'bold 16px monospace';
        ctx.fillText(`${idx + 1}`, -centerX, centerY);
      });
      
      ctx.restore();
    }
    
    function calibrateSensitivity() {
      // Cycle à travers différents seuils
      const thresholds = [20, 30, 40, 50];
      const currentIndex = thresholds.indexOf(params.edgeThreshold);
      const nextIndex = (currentIndex + 1) % thresholds.length;
      params.edgeThreshold = thresholds[nextIndex];
      
      // Ajuster les autres paramètres en fonction
      params.minLineLength = params.edgeThreshold < 30 ? 50 : 70;
      
      updateStatus(`🎯 Sensibilité: ${params.edgeThreshold === 20 ? 'Haute' : params.edgeThreshold === 30 ? 'Moyenne+' : params.edgeThreshold === 40 ? 'Moyenne' : 'Basse'}`);
      
      // Feedback visuel
      const btn = document.getElementById('calibrate');
      btn.style.transform = 'scale(0.95)';
      setTimeout(() => { btn.style.transform = ''; }, 200);
    }
    
    function updateStatus(msg) {
      const statusDiv = document.getElementById('status');
      statusDiv.innerHTML = `📡 ${msg}`;
      console.log(msg);
    }
    
    // Démarrer immédiatement
    init();
  </script>
</body>
</html>
