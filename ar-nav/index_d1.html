<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Nav OSM - Détection des Façades</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #ui {
      position: absolute; top: 10px; left: 10px; color: white; 
      background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
      padding: 15px; border-radius: 12px; 
      z-index: 100; pointer-events: auto; max-width: 320px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    button { 
      display: block; width: 100%; padding: 12px; margin: 8px 0; 
      font-size: 1em; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 8px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
    button:active { transform: translateY(0); }
    #status { margin-top: 10px; font-weight: bold; color: #4ecdc4; font-size: 0.9em; }
    #facade-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
    }
    .info-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      padding: 8px 12px;
      border-radius: 8px;
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      z-index: 100;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h2>🏢 AR Navigation - Détection Façades</h2>
    <div id="status">🎯 Chargement...</div>
  </div>
  <canvas id="facade-canvas"></canvas>
  <div class="info-badge" id="facade-count">🏢 Façades: 0</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    let scene, camera, renderer, xrSession = null;
    let currentPosition = { lat: -18.8792, lon: 47.5079 };
    let destination = null;
    let navigationArrows = [];
    let osmMeshes = [];
    let worldGroup = new THREE.Group();
    let facadeCanvas, ctx;
    let videoElement = null;
    let detectionInterval = null;
    let facadeLines = [];
    let currentFacades = [];

    // ====================== INIT ======================
    async function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 400);
      
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      scene.add(worldGroup);
      scene.add(new THREE.HemisphereLight(0xffffff, 0x8888ff, 1.4));
      scene.add(new THREE.AmbientLight(0x404060));
      
      const dirLight = new THREE.DirectionalLight(0xffffff, 1);
      dirLight.position.set(10, 20, 5);
      scene.add(dirLight);

      setupFacadeDetection();
      createARButton();
      setupUI();
      getCurrentPosition();
      startCameraForDetection();

      renderer.setAnimationLoop(animate);
    }

    function animate() {
      renderer.render(scene, camera);
      if (videoElement && videoElement.readyState === 4) {
        detectFacadesFromVideo();
      }
    }

    // ====================== DÉTECTION DES FAÇADES ======================
    function setupFacadeDetection() {
      facadeCanvas = document.getElementById('facade-canvas');
      ctx = facadeCanvas.getContext('2d');
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    }

    function resizeCanvas() {
      facadeCanvas.width = window.innerWidth;
      facadeCanvas.height = window.innerHeight;
    }

    async function startCameraForDetection() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        videoElement = document.createElement('video');
        videoElement.srcObject = stream;
        videoElement.autoplay = true;
        videoElement.playsInline = true;
        videoElement.onloadedmetadata = () => videoElement.play();
        updateStatus("📷 Caméra activée - Détection façades en cours");
      } catch (err) {
        console.error("Erreur caméra:", err);
        updateStatus("⚠️ Caméra non disponible - Détection simulée");
        startSimulatedDetection();
      }
    }

    function startSimulatedDetection() {
      detectionInterval = setInterval(() => {
        simulateFacadeDetection();
      }, 3000);
    }

    function simulateFacadeDetection() {
      const simulatedFacades = [];
      const numFacades = Math.floor(Math.random() * 5) + 2;
      
      for (let i = 0; i < numFacades; i++) {
        simulatedFacades.push({
          id: i,
          confidence: 0.6 + Math.random() * 0.4,
          corners: generateRandomCorners()
        });
      }
      
      drawFacades(simulatedFacades);
      updateFacadeCount(simulatedFacades.length);
      updateStatus(`🏢 ${simulatedFacades.length} façades détectées (simulation)`);
      
      // Ajouter des bâtiments virtuels 3D correspondants
      addVirtualBuildingsFromFacades(simulatedFacades);
    }

    function generateRandomCorners() {
      const x = Math.random() * (window.innerWidth - 200) + 100;
      const y = Math.random() * (window.innerHeight - 200) + 100;
      const width = 100 + Math.random() * 150;
      const height = 150 + Math.random() * 200;
      
      return [
        { x: x, y: y },
        { x: x + width, y: y },
        { x: x + width, y: y + height },
        { x: x, y: y + height }
      ];
    }

    function detectFacadesFromVideo() {
      if (!videoElement || videoElement.readyState < 2) return;
      
      const canvas = document.createElement('canvas');
      canvas.width = 320;
      canvas.height = 240;
      const tempCtx = canvas.getContext('2d');
      tempCtx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
      
      const imageData = tempCtx.getImageData(0, 0, canvas.width, canvas.height);
      const detectedFacades = performEdgeDetection(imageData);
      
      if (detectedFacades.length > 0) {
        drawFacades(detectedFacades);
        updateFacadeCount(detectedFacades.length);
        updateStatus(`🏢 ${detectedFacades.length} façades détectées`);
      }
    }

    function performEdgeDetection(imageData) {
      const width = imageData.width;
      const height = imageData.height;
      const data = imageData.data;
      
      // Détection de contours simplifiée (Sobel-like)
      const edges = [];
      
      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const idx = (y * width + x) * 4;
          const gx = -data[idx - 4] + data[idx + 4] - 2 * data[idx - width * 4] + 2 * data[idx + width * 4] - data[idx - width * 4 - 4] + data[idx + width * 4 + 4];
          const gy = -data[idx - width * 4] + data[idx + width * 4] - 2 * data[idx - 4] + 2 * data[idx + 4] - data[idx - width * 4 - 4] + data[idx + width * 4 + 4];
          const magnitude = Math.sqrt(gx * gx + gy * gy);
          
          if (magnitude > 50) {
            edges.push({ x: x, y: y, magnitude: magnitude });
          }
        }
      }
      
      // Grouper les contours en façades potentielles
      const facades = groupEdgesIntoFacades(edges, width, height);
      return facades.slice(0, 8); // Maximum 8 façades
    }

    function groupEdgesIntoFacades(edges, width, height) {
      const facades = [];
      const used = new Set();
      
      for (const edge of edges) {
        if (used.has(edge)) continue;
        
        const facadeCorners = findRectangleCorners(edges, edge, width, height);
        if (facadeCorners && facadeCorners.length === 4) {
          facades.push({
            id: facades.length,
            confidence: 0.7 + Math.random() * 0.3,
            corners: facadeCorners.map(c => ({ x: c.x * (facadeCanvas.width / width), y: c.y * (facadeCanvas.height / height) }))
          });
          
          edges.slice(0, 10).forEach(e => used.add(e));
        }
      }
      
      return facades;
    }

    function findRectangleCorners(edges, startEdge, width, height) {
      // Simplification : retourner un rectangle virtuel
      if (edges.length < 4) return null;
      
      const x = Math.max(0, startEdge.x - 50);
      const y = Math.max(0, startEdge.y - 50);
      const rectWidth = Math.min(width - x, 80 + Math.random() * 100);
      const rectHeight = Math.min(height - y, 120 + Math.random() * 150);
      
      return [
        { x: x, y: y },
        { x: x + rectWidth, y: y },
        { x: x + rectWidth, y: y + rectHeight },
        { x: x, y: y + rectHeight }
      ];
    }

    function drawFacades(facades) {
      currentFacades = facades;
      ctx.clearRect(0, 0, facadeCanvas.width, facadeCanvas.height);
      
      facades.forEach((facade, idx) => {
        const corners = facade.corners;
        
        // Dessiner les lignes des façades
        ctx.beginPath();
        ctx.moveTo(corners[0].x, corners[0].y);
        for (let i = 1; i < corners.length; i++) {
          ctx.lineTo(corners[i].x, corners[i].y);
        }
        ctx.closePath();
        
        // Style des lignes
        ctx.strokeStyle = `hsl(${idx * 60}, 100%, 50%)`;
        ctx.lineWidth = 3;
        ctx.stroke();
        
        // Remplissage semi-transparent
        ctx.fillStyle = `rgba(100, 150, 255, ${0.2 + facade.confidence * 0.2})`;
        ctx.fill();
        
        // Dessiner les coins
        corners.forEach(corner => {
          ctx.beginPath();
          ctx.arc(corner.x, corner.y, 5, 0, 2 * Math.PI);
          ctx.fillStyle = '#ff4444';
          ctx.fill();
          ctx.strokeStyle = 'white';
          ctx.lineWidth = 2;
          ctx.stroke();
        });
        
        // Ajouter des annotations 3D correspondantes
        add3DFacadeFromDetection(facade, idx);
      });
    }

    function add3DFacadeFromDetection(facade, index) {
      const centerX = facade.corners.reduce((sum, c) => sum + c.x, 0) / 4;
      const centerY = facade.corners.reduce((sum, c) => sum + c.y, 0) / 4;
      
      // Position relative dans l'espace 3D
      const xPos = (centerX / window.innerWidth - 0.5) * 20;
      const yPos = -(centerY / window.innerHeight - 0.5) * 10;
      const zPos = -5 - (facade.confidence * 5);
      
      // Créer un marqueur 3D pour la façade détectée
      const markerGeometry = new THREE.BoxGeometry(0.5, 1, 0.1);
      const markerMaterial = new THREE.MeshPhongMaterial({ 
        color: new THREE.Color().setHSL(index * 0.15, 1, 0.5),
        emissive: 0x222222,
        transparent: true,
        opacity: 0.8
      });
      const marker = new THREE.Mesh(markerGeometry, markerMaterial);
      marker.position.set(xPos, yPos, zPos);
      marker.userData = { isFacade: true, id: facade.id };
      
      worldGroup.add(marker);
      facadeLines.push(marker);
      
      // Ajouter un contour lumineux
      const edgesGeo = new THREE.EdgesGeometry(markerGeometry);
      const edgesMat = new THREE.LineBasicMaterial({ color: 0xffaa44 });
      const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
      marker.add(wireframe);
    }

    function addVirtualBuildingsFromFacades(facades) {
      // Nettoyer les anciens marqueurs
      facadeLines.forEach(line => worldGroup.remove(line));
      facadeLines = [];
      
      facades.forEach((facade, idx) => {
        add3DFacadeFromDetection(facade, idx);
      });
    }

    function updateFacadeCount(count) {
      const badge = document.getElementById('facade-count');
      badge.innerHTML = `🏢 Façades: ${count}`;
      badge.style.color = count > 0 ? '#0f0' : '#ff0';
    }

    // ====================== AR Button ======================
    function createARButton() {
      const button = document.createElement('button');
      button.textContent = '🔍 ENTRER EN AR';
      button.style.position = 'absolute';
      button.style.bottom = '40px';
      button.style.left = '50%';
      button.style.transform = 'translateX(-50%)';
      button.style.padding = '18px 40px';
      button.style.fontSize = '1.4em';
      button.style.zIndex = '1000';
      button.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
      button.style.color = 'white';
      button.style.border = 'none';
      button.style.borderRadius = '50px';
      button.style.cursor = 'pointer';
      button.style.fontWeight = 'bold';
      button.style.boxShadow = '0 4px 15px rgba(0,0,0,0.3)';

      button.onclick = async () => {
        try {
          if (navigator.xr) {
            xrSession = await navigator.xr.requestSession('immersive-ar', {
              requiredFeatures: ['local-floor', 'hit-test'],
              optionalFeatures: ['dom-overlay']
            });
            renderer.xr.setSession(xrSession);
            updateStatus('✅ Mode AR activé - Bougez pour détecter les façades');
            button.style.display = 'none';
          } else {
            updateStatus('⚠️ AR non supporté - Mode simulation actif');
          }
        } catch (err) {
          updateStatus('⚠️ Mode simulation AR');
          console.log("AR non disponible, mode simulation");
        }
      };
      document.body.appendChild(button);
    }

    // ====================== GPS + Carte ======================
    function getCurrentPosition() {
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
          currentPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
          updateStatus(`📍 Pos: ${currentPosition.lat.toFixed(4)}, ${currentPosition.lon.toFixed(4)}`);
        }, null, { enableHighAccuracy: true });
      }
    }

    function addOSMMap() {
      const container = document.createElement('div');
      container.style.position = 'absolute';
      container.style.bottom = '10px';
      container.style.left = '10px';
      container.style.width = '220px';
      container.style.height = '160px';
      container.style.border = '2px solid #667eea';
      container.style.borderRadius = '8px';
      container.style.zIndex = '200';
      container.style.overflow = 'hidden';
      container.style.backgroundColor = '#fff';

      const iframe = document.createElement('iframe');
      iframe.src = `https://www.openstreetmap.org/export/embed.html?bbox=${currentPosition.lon-0.005},${currentPosition.lat-0.005},${currentPosition.lon+0.005},${currentPosition.lat+0.005}&layer=mapnik`;
      iframe.style.width = '100%';
      iframe.style.height = '100%';
      iframe.style.border = 'none';
      container.appendChild(iframe);
      document.body.appendChild(container);
    }

    // ====================== CHARGEMENT OSM ======================
    async function loadOSMBuildings() {
      updateStatus("🏢 Chargement bâtiments OSM...");
      
      const query = `[out:json];way["building"](${currentPosition.lat-0.002},${currentPosition.lon-0.002},${currentPosition.lat+0.002},${currentPosition.lon+0.002});out geom;`;
      
      try {
        const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
        const data = await res.json();

        osmMeshes.forEach(m => worldGroup.remove(m));
        osmMeshes = [];

        data.elements.forEach((building) => {
          if (!building.geometry || building.geometry.length < 3) return;

          const points = building.geometry.map(p => projectLatLon(p.lat, p.lon));
          const shape = new THREE.Shape(points);
          const height = (building.tags && building.tags.height) ? parseFloat(building.tags.height) * 0.3 : 8;
          
          const geometry = new THREE.ExtrudeGeometry(shape, { depth: height, bevelEnabled: false });
          const material = new THREE.MeshPhongMaterial({ color: 0x44aaff, transparent: true, opacity: 0.6 });
          const mesh = new THREE.Mesh(geometry, material);
          mesh.position.y = 0;
          mesh.castShadow = true;
          
          worldGroup.add(mesh);
          osmMeshes.push(mesh);
        });

        updateStatus(`✅ ${osmMeshes.length} bâtiments chargés`);
      } catch (e) {
        updateStatus("❌ Erreur chargement OSM");
        console.error(e);
      }
    }

    function projectLatLon(lat, lon) {
      const scale = 90000;
      const x = (lon - currentPosition.lon) * scale * Math.cos(currentPosition.lat * Math.PI / 180);
      const z = (currentPosition.lat - lat) * scale;
      return new THREE.Vector2(x * 0.5, z * 0.5);
    }

    // ====================== UI ======================
    function setupUI() {
      const ui = document.getElementById('ui');
      addOSMMap();

      const buttons = [
        { text: '🏢 Charger Bâtiments OSM', fn: loadOSMBuildings },
        { text: '🎯 Détecter Façades', fn: () => simulateFacadeDetection() },
        { text: '🗑️ Effacer Marquages', fn: clearAllMarkers }
      ];

      buttons.forEach(btn => {
        const button = document.createElement('button');
        button.textContent = btn.text;
        button.onclick = btn.fn;
        ui.appendChild(button);
      });
    }

    function clearAllMarkers() {
      facadeLines.forEach(line => worldGroup.remove(line));
      facadeLines = [];
      ctx.clearRect(0, 0, facadeCanvas.width, facadeCanvas.height);
      updateFacadeCount(0);
      updateStatus("🧹 Marquages effacés");
    }

    function updateStatus(text) {
      const statusDiv = document.getElementById('status');
      statusDiv.innerHTML = text;
      console.log(text);
    }

    // Démarrer l'application
    window.onload = init;
  </script>
</body>
</html>
