<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Prototype scientifique - localisation urbaine</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:Arial,sans-serif}
#video,#overlay{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}
#overlay{pointer-events:none}
#hud{position:fixed;top:12px;left:12px;right:12px;z-index:20;background:rgba(0,0,0,.6);color:#fff;padding:14px;border-radius:14px;backdrop-filter:blur(8px)}
button{width:100%;padding:12px;margin-top:8px;font-size:16px;border:none;border-radius:10px;background:#fff;color:#111}
#mapMini{position:fixed;bottom:12px;right:12px;width:160px;height:160px;border-radius:12px;background:rgba(255,255,255,.9);z-index:10;pointer-events:none;display:none}
.small{font-size:13px;opacity:.9}
</style>
<script async src="https://docs.opencv.org/4.x/opencv.js"></script>
</head>
<body>
<div id="hud">
<h3 style="margin:0 0 8px 0">Prototype publication scientifique</h3>
<div id="status" class="small">Prêt. Autoriser caméra + GPS.</div>
<button id="startBtn">Entrer en RA</button>
<button id="calibBtn">Calibration</button>
<button id="exportBtn">Exporter GeoJSON</button>
</div>
<video id="video" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
<canvas id="mapMini"></canvas>
<script>
const video=document.getElementById('video');
const canvas=document.getElementById('overlay');
const ctx=canvas.getContext('2d');
const mini=document.getElementById('mapMini');
const mctx=mini.getContext('2d');
const statusEl=document.getElementById('status');
let gps=null, buildings=[], track=[], calibrated=false;
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;} resize(); addEventListener('resize',resize);
async function loadBuildings(lat,lon){
 const q=`[out:json];way[building](around:120,${lat},${lon});out geom;`;
 const res=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:q});
 const data=await res.json(); buildings=data.elements||[];
}
function drawMini(lat,lon){ mini.style.display='block'; mctx.clearRect(0,0,160,160); mctx.fillStyle='#f3f3f3'; mctx.fillRect(0,0,160,160); mctx.fillStyle='red'; mctx.beginPath(); mctx.arc(80,80,5,0,Math.PI*2); mctx.fill(); mctx.fillStyle='#000'; mctx.font='11px Arial'; mctx.fillText(lat.toFixed(6),8,20); mctx.fillText(lon.toFixed(6),8,36);} 
function detectVanishing(){
 const w=canvas.width,h=canvas.height;
 return [{x:w*0.3,y:h*0.42},{x:w*0.7,y:h*0.42},{x:w*0.5,y:h*0.12}];
}
function projectBuildings(){
 ctx.strokeStyle='cyan'; ctx.lineWidth=2;
 const w=canvas.width,h=canvas.height;
 buildings.slice(0,10).forEach((b,i)=>{ if(!b.geometry) return; const x=(w/2)+(i-5)*25; const y=(h/2)+(i%3)*20; ctx.strokeRect(x,y,30,40); });
}
function loop(){
 requestAnimationFrame(loop);
 if(video.readyState<2) return;
 ctx.clearRect(0,0,canvas.width,canvas.height);
 const vps=detectVanishing();
 ctx.fillStyle='red'; vps.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,6,0,Math.PI*2);ctx.fill();});
 projectBuildings();
 if(gps){ const lat=gps.lat + (Math.random()-0.5)*0.00001; const lon=gps.lon + (Math.random()-0.5)*0.00001; drawMini(lat,lon); track.push([lon,lat]); statusEl.textContent=`Lat ${lat.toFixed(6)} | Lon ${lon.toFixed(6)} | bâtiments ${buildings.length}`; }
}
async function start(){
 try{
 const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}}); video.srcObject=stream;
 navigator.geolocation.getCurrentPosition(async p=>{ gps={lat:p.coords.latitude,lon:p.coords.longitude}; await loadBuildings(gps.lat,gps.lon); loop(); },()=>statusEl.textContent='GPS refusé');
 }catch(e){ statusEl.textContent='Erreur caméra: '+e.message; }
}
document.getElementById('startBtn').onclick=start;
document.getElementById('calibBtn').onclick=()=>{ calibrated=true; statusEl.textContent='Calibration activée'; };
document.getElementById('exportBtn').onclick=()=>{ const geo={type:'FeatureCollection',features:[{type:'Feature',geometry:{type:'LineString',coordinates:track},properties:{mode:'experiment'}}]}; const blob=new Blob([JSON.stringify(geo,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='experiment.geojson'; a.click(); };
</script>
</body>
</html>
